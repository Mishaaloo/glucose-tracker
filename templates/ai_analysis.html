{% extends "base.html" %}
{% block title %}AI Analysis{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow">
                <h3 style="color: #64ffda;">AI Analysis</h3>
                <hr style="border-color: #1e3a5f;">
                <p style="line-height: 1.8;">{{ analysis | replace('\n', '<br>') | safe }}</p>
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary mt-3">Back to Readings</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
