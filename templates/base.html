<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="icon" href="{{ url_for('static', filename='images/GlucoTracker.ico') }}">
    <title>{% block title %}{% endblock %}</title>
    <style>
    body {
    background-image: url("{{ url_for('static', filename='images/background.png') }}");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-color: #0d1b2a;
    color: #e0e0e0;
}

body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(13, 27, 42, 0.75);
    z-index: 0;
    animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe {
    0%   { opacity: 0.7; }
    50%  { opacity: 1; }
    100% { opacity: 0.7; }
}

.navbar {
    position: relative;
    z-index: 10 !important;
}

.card {
    background-color: #112240;
    border: 1px solid #1e3a5f;
    color: #e0e0e0;
    position: relative;
    z-index: 1;
}

.container {
    position: relative;
    z-index: 1;
}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <a class="navbar-brand" href="{{ url_for('home') }}">Glucose Tracker</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('home') }}">Log A Reading Here</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('index') }}">Last 7 Readings</a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      {% if "user" in session %}
        <li class="nav-item">
          <span class="nav-link disabled">Hey, {{ session['user'] }}</span>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('ai_analysis') }}">AI Analysis</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
        </li>
      {% else %}
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('login') }}">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('register') }}">Register</a>
        </li>
      {% endif %}
    </ul>
  </div>
</nav>

{% block content %}
{% endblock %}

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
